server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions-gateway.yaml

clients:
  - url: ${LOKI_URL}/loki/api/v1/push

scrape_configs:
  # Caddy Gateway logs
  - job_name: caddy_gateway
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Filter Caddy container
      - source_labels: ['__meta_docker_container_name']
        regex: 'caddy-gateway'
        action: keep
      # Extract container name
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)' 
        target_label: 'container_name'
      # Add container ID
      - source_labels: ['__meta_docker_container_id']
        target_label: 'container_id'
      # Add labels
      - target_label: 'environment'
        replacement: 'gateway'
      - target_label: 'job'
        replacement: 'caddy'
      - target_label: 'app'
        replacement: 'caddy-gateway'

    pipeline_stages:
      # Parse Docker JSON log format
      - json:
          expressions:
            output: log
            stream: stream
            time: time

      # Parse Caddy JSON logs
      - match:
          selector: '{container_name="caddy-gateway"}'
          stages:
            - json:
                expressions:
                  level: level
                  msg: msg
                  logger: logger
                  request_remote_ip: request.remote_ip
                  request_method: request.method
                  request_host: request.host
                  request_uri: request.uri
                  status: status
                  duration: duration
                source: output
            - labels:
                level:
                request_method:
                request_host:
                status:

      # Output final
      - output:
          source: output

  # Cloudflared Tunnels (Production)
  - job_name: cloudflared_prod
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Filter Cloudflared Prod container
      - source_labels: ['__meta_docker_container_name']
        regex: 'cloudflared-gateway-prod'
        action: keep
      # Extract container name
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)' 
        target_label: 'container_name'
      # Add container ID
      - source_labels: ['__meta_docker_container_id']
        target_label: 'container_id'
      # Add labels
      - target_label: 'environment'
        replacement: 'gateway'
      - target_label: 'job'
        replacement: 'cloudflared'
      - target_label: 'tunnel_env'
        replacement: 'production'
      - target_label: 'app'
        replacement: 'cloudflared'

    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            time: time
      - output:
          source: output

  # Cloudflared Tunnels (QA)
  - job_name: cloudflared_qa
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Filter Cloudflared QA container
      - source_labels: ['__meta_docker_container_name']
        regex: 'cloudflared-gateway-qa'
        action: keep
      # Extract container name
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)' 
        target_label: 'container_name'
      # Add container ID
      - source_labels: ['__meta_docker_container_id']
        target_label: 'container_id'
      # Add labels
      - target_label: 'environment'
        replacement: 'gateway'
      - target_label: 'job'
        replacement: 'cloudflared'
      - target_label: 'tunnel_env'
        replacement: 'qa'
      - target_label: 'app'
        replacement: 'cloudflared'

    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            time: time
      - output:
          source: output

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions-prod.yaml

clients:
  - url: ${LOKI_URL}/loki/api/v1/push

scrape_configs:
  # Production API logs
  - job_name: workshop_api_prod
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Filter only production environment
      - source_labels: ['__meta_docker_container_label_workshop_env']
        regex: 'production'
        action: keep
      # Extract container name
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)' 
        target_label: 'container_name'
      # Add container ID
      - source_labels: ['__meta_docker_container_id']
        target_label: 'container_id'
      # Add environment label
      - target_label: 'environment'
        replacement: 'production'
      # Add job label
      - target_label: 'job'
        replacement: 'workshop_api'

    pipeline_stages:
      # Parse Docker JSON log format
      - json:
          expressions:
            output: log
            stream: stream
            time: time

      # Parse application JSON logs (Spring Boot)
      - match:
          selector: '{container_name="${APP_CONTAINER_NAME}"}'
          stages:
            - json:
                expressions:
                  level: level
                  logger: logger
                  requestId: requestId
                  httpMethod: httpMethod
                  httpPath: httpPath
                  httpStatus: httpStatus
                  durationMs: durationMs
                  application: application
                  message: message
                source: output
            - labels:
                level:
                requestId:
                httpMethod:
                httpPath:
                httpStatus:

      # Output final
      - output:
          source: output

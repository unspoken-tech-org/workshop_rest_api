apiVersion: 1

datasources:
  - name: Loki Unified
    type: loki
    access: proxy
    url: http://loki-unified:3100
    isDefault: true
    editable: true
    jsonData:
      maxLines: 1000
      derivedFields:
        # Extract request ID from logs and make it clickable
        - matcherRegex: 'requestId["\s:]+([a-f0-9-]+)'
          name: RequestID
          url: '#'

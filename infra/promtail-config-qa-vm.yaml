server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions-qa.yaml

clients:
  - url: ${LOKI_URL}/loki/api/v1/push

scrape_configs:
  # QA API logs
  - job_name: workshop_api_qa
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["workshop.env=qa"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container_name'
      - source_labels: ['__meta_docker_container_id']
        target_label: 'container_id'
      - target_label: 'environment'
        replacement: 'qa'
      - target_label: 'job'
        replacement: 'workshop_api'

    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            time: time

      - match:
          selector: '{container_name="workshop-api-qa"}'
          stages:
            - json:
                expressions:
                  level: level
                  logger: logger
                  requestId: requestId
                  httpMethod: httpMethod
                  httpPath: httpPath
                  httpStatus: httpStatus
                  durationMs: durationMs
                  application: application
                  message: message
                source: output
            - labels:
                level:
                requestId:
                httpMethod:
                httpPath:
                httpStatus:

      - output:
          source: output

  # Caddy Gateway QA logs
  - job_name: caddy_gateway_qa
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ["caddy-gateway-qa"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container_name'
      - source_labels: ['__meta_docker_container_id']
        target_label: 'container_id'
      - target_label: 'environment'
        replacement: 'qa'
      - target_label: 'job'
        replacement: 'caddy'
      - target_label: 'app'
        replacement: 'caddy-gateway-qa'

    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            time: time

      - match:
          selector: '{container_name="caddy-gateway-qa"}'
          stages:
            - json:
                expressions:
                  level: level
                  msg: msg
                  logger: logger
                  request_remote_ip: request.remote_ip
                  request_method: request.method
                  request_host: request.host
                  request_uri: request.uri
                  status: status
                  duration: duration
                source: output
            - labels:
                level:
                request_method:
                request_host:
                status:

      - output:
          source: output

  # Cloudflared QA Tunnel logs
  - job_name: cloudflared_qa
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ["cloudflared-gateway-qa"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container_name'
      - source_labels: ['__meta_docker_container_id']
        target_label: 'container_id'
      - target_label: 'environment'
        replacement: 'qa'
      - target_label: 'job'
        replacement: 'cloudflared'
      - target_label: 'app'
        replacement: 'cloudflared'

    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            time: time
      - output:
          source: output

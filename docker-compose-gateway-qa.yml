services:
  caddy-gateway-qa:
    build:
      context: ./infra/caddy
      dockerfile: Dockerfile
    image: workshop/caddy-gateway-qa:latest
    container_name: caddy-gateway-qa
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CF_API_TOKEN=${CF_API_TOKEN}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
    volumes:
      - ./infra/caddy/Caddyfile-gateway-qa:/etc/caddy/Caddyfile
      - caddy_data_qa:/data
      - caddy_config_qa:/config
    networks:
      - workshop-ingress
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:2019/config/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      - cloudflared-qa

  cloudflared-qa:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-gateway-qa
    restart: unless-stopped
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - workshop-ingress

volumes:
  caddy_data_qa:
  caddy_config_qa:

networks:
  workshop-ingress:
    name: workshop-ingress
    driver: bridge

name: Deploy Gateway via SSH (QA)
description: >
  Prepares .env on the runner, scps to the QA VM and runs deploy-gateway-qa.sh.
  Used exclusively by the `deploy-gateway-qa.yml` pipeline.
  Requires Setup Tailscale executed previously in the job.

inputs:
  ssh-target:
    description: 'SSH target in the user@host format'
    required: true
  deploy-dir:
    description: 'Deploy directory on the server'
    required: true
  registry:
    description: 'Docker registry (e.g., ghcr.io)'
    required: true
  image-name:
    description: 'Full image name in the registry (e.g., org/repo)'
    required: true
  local-image-name:
    description: 'Local image name generated by docker compose'
    required: true
  compose-file:
    description: 'docker-compose file name on the server'
    required: true
  image-tag:
    description: 'Image tag to be deployed'
    required: true
  deploy-script:
    description: 'Path to deploy.sh in the repository'
    required: true
  admin-email:
    description: 'Application admin email'
    required: true
  cf-api-token:
    description: 'Cloudflare API token for DNS challenge'
    required: true
  cloudflare-tunnel-token:
    description: 'Cloudflare tunnel token for QA'
    required: true

runs:
  using: composite
  steps:
    - name: Prepare deploy files on runner
      shell: bash
      env:
        ADMIN_EMAIL: ${{ inputs.admin-email }}
        CF_API_TOKEN: ${{ inputs.cf-api-token }}
        CLOUDFLARE_TUNNEL_TOKEN: ${{ inputs.cloudflare-tunnel-token }}
      run: |
        set -e

        {
          echo "ADMIN_EMAIL=${ADMIN_EMAIL}"
          echo "CF_API_TOKEN=${CF_API_TOKEN}"
          echo "CLOUDFLARE_TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}"
        } > /tmp/.env
        chmod 600 /tmp/.env

        echo "Gateway QA deploy files prepared"

    - name: Upload files to server
      shell: bash
      env:
        SSH_TARGET: ${{ inputs.ssh-target }}
        DEPLOY_DIR: ${{ inputs.deploy-dir }}
        DEPLOY_SCRIPT: ${{ inputs.deploy-script }}
        COMPOSE_FILE: ${{ inputs.compose-file }}
      run: |
        set -e

        # Ensure deploy directory and ~/.docker exist on the server
        ssh -o ConnectTimeout=30 \
          -o StrictHostKeyChecking=no \
          "${SSH_TARGET}" "mkdir -p '${DEPLOY_DIR}' ~/.docker && chmod 700 ~/.docker"

        mkdir -p ~/.docker
        chmod 700 ~/.docker

        scp -o ConnectTimeout=30 \
          -o StrictHostKeyChecking=no \
          /tmp/.env \
          "${DEPLOY_SCRIPT}" \
          "${SSH_TARGET}:/tmp/"

        # Upload compose file and Caddyfile if they don't exist on the server
        scp -o ConnectTimeout=30 \
          -o StrictHostKeyChecking=no \
          "${COMPOSE_FILE}" \
          "${SSH_TARGET}:${DEPLOY_DIR}/${COMPOSE_FILE}"

        CADDYFILE="Caddyfile-gateway-qa"
        if [ -f "${CADDYFILE}" ]; then
          scp -o ConnectTimeout=30 \
            -o StrictHostKeyChecking=no \
            "${CADDYFILE}" \
            "${SSH_TARGET}:${DEPLOY_DIR}/${CADDYFILE}"
        fi

        scp -o ConnectTimeout=30 \
          -o StrictHostKeyChecking=no \
          "${HOME}/.docker/config.json" \
          "${SSH_TARGET}:~/.docker/config.json.tmp"

        echo "Files uploaded to ${SSH_TARGET}:${DEPLOY_DIR}/"

    - name: Execute deploy on server
      shell: bash
      env:
        SSH_TARGET: ${{ inputs.ssh-target }}
        DEPLOY_DIR: ${{ inputs.deploy-dir }}
        REGISTRY: ${{ inputs.registry }}
        IMAGE_NAME: ${{ inputs.image-name }}
        LOCAL_IMAGE_NAME: ${{ inputs.local-image-name }}
        COMPOSE_FILE: ${{ inputs.compose-file }}
        IMAGE_TAG: ${{ inputs.image-tag }}
      run: |
        set -e

        ssh -o ConnectTimeout=30 -o StrictHostKeyChecking=no \
          "${SSH_TARGET}" \
          env DEPLOY_DIR="${DEPLOY_DIR}" \
              REGISTRY="${REGISTRY}" \
              IMAGE_NAME="${IMAGE_NAME}" \
              LOCAL_IMAGE_NAME="${LOCAL_IMAGE_NAME}" \
              COMPOSE_FILE="${COMPOSE_FILE}" \
              IMAGE_TAG="${IMAGE_TAG}" \
              bash /tmp/deploy.sh

name: Setup Tailscale
description: >
  Configura nó efêmero na mesh Tailscale para acesso SSH ao servidor via WireGuard.
  Requer secrets TS_AUTH_KEY e TS_TAILSCALE_IP no repositório.

inputs:
  authkey:
    description: 'Tailscale auth key'
    required: false
    default: ''
  tags:
    description: 'Tags do nó Tailscale (separadas por vírgula)'
    required: false
    default: 'tag:ci'
  ping:
    description: 'IP do servidor na mesh Tailscale para o runner esperar antes de prosseguir'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Setup Tailscale
      uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
      with:
        authkey: ${{ inputs.authkey }}
        tags: ${{ inputs.tags }}
        ping: ${{ inputs.ping }}

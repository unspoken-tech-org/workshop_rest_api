name: Print Deploy Banner
description: >
  Imprime banner padronizado com informações do deploy (versão, commit, ator, trigger, imagem).
  Usa o contexto github internamente para evitar duplicação entre jobs.

  Shared composite action — usado por `deploy-api-prod.yml` e `deploy-gateway-prod.yml`.
  Mudanças aqui afetam 2 pipelines de produção.

inputs:
  prefix:
    description: 'Prefixo do banner (ex: BUILD, DEPLOY)'
    required: true
  image-tag:
    description: 'Tag da imagem Docker'
    required: true

runs:
  using: composite
  steps:
    - name: Print banner
      shell: bash
      env:
        PREFIX: ${{ inputs.prefix }}
        IMAGE_TAG: ${{ inputs.image-tag }}
        GIT_REF_NAME: ${{ github.ref_name }}
        GIT_SHA: ${{ github.sha }}
        GIT_ACTOR: ${{ github.actor }}
        GIT_EVENT: ${{ github.event_name }}
      run: |
        echo ""
        echo "============================================="
        echo "  ${PREFIX} ${GIT_EVENT}: ${GIT_REF_NAME}"
        echo "============================================="
        echo ""
        echo "  Version: ${GIT_REF_NAME}"
        echo "  Commit:  ${GIT_SHA}"
        echo "  Actor:   ${GIT_ACTOR}"
        echo "  Trigger: ${GIT_EVENT}"
        echo "  Image:   ${IMAGE_TAG}"
        echo ""
        echo "============================================="

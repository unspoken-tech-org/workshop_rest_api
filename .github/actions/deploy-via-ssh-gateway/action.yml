name: Deploy Gateway via SSH
description: >
  Prepara .env do gateway no runner, faz scp para o servidor e executa deploy-gateway.sh.
  Requer Setup Tailscale executado previamente no job (depende de túnel WireGuard).
  NÃO cria chaves JWT (gateway não usa); só secrets CF + tunnel + admin email.

inputs:
  ssh-target:
    description: 'Destino SSH no formato user@host'
    required: true
  deploy-dir:
    description: 'Diretório de deploy no servidor'
    required: true
  registry:
    description: 'Registry Docker (ex: ghcr.io)'
    required: true
  image-name:
    description: 'Nome completo da imagem no registry (ex: org/repo/caddy-gateway)'
    required: true
  local-image-name:
    description: 'Nome local da imagem usado pelo docker compose (ex: workshop/caddy-gateway)'
    required: true
  compose-file:
    description: 'Nome do arquivo docker-compose no servidor'
    required: true
  image-tag:
    description: 'Tag da imagem a ser deployada'
    required: true
  deploy-script:
    description: 'Caminho do deploy-gateway.sh no repositório'
    required: true
  admin-email:
    description: 'Email do admin (Let''s Encrypt / ACME)'
    required: true
  cf-api-token:
    description: 'Cloudflare API Token (production DNS challenge)'
    required: true
  cf-api-token-qa:
    description: 'Cloudflare API Token (QA DNS challenge)'
    required: true
  cloudflare-tunnel-token:
    description: 'Cloudflare Tunnel Token (production tunnel container)'
    required: true
  cloudflare-tunnel-token-qa:
    description: 'Cloudflare Tunnel Token (QA tunnel container)'
    required: true

runs:
  using: composite
  steps:
    - name: Prepare deploy files on runner
      shell: bash
      env:
        ADMIN_EMAIL: ${{ inputs.admin-email }}
        CF_API_TOKEN: ${{ inputs.cf-api-token }}
        CF_API_TOKEN_QA: ${{ inputs.cf-api-token-qa }}
        CLOUDFLARE_TUNNEL_TOKEN: ${{ inputs.cloudflare-tunnel-token }}
        CLOUDFLARE_TUNNEL_TOKEN_QA: ${{ inputs.cloudflare-tunnel-token-qa }}
      run: |
        set -e

        {
          echo "ADMIN_EMAIL=${ADMIN_EMAIL}"
          echo "CF_API_TOKEN=${CF_API_TOKEN}"
          echo "CF_API_TOKEN_QA=${CF_API_TOKEN_QA}"
          echo "CLOUDFLARE_TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}"
          echo "CLOUDFLARE_TUNNEL_TOKEN_QA=${CLOUDFLARE_TUNNEL_TOKEN_QA}"
        } > /tmp/.env
        chmod 600 /tmp/.env

        echo "Deploy files prepared:"
        ls -la /tmp/.env

    - name: Upload files to server
      shell: bash
      env:
        SSH_TARGET: ${{ inputs.ssh-target }}
        DEPLOY_SCRIPT: ${{ inputs.deploy-script }}
      run: |
        set -e

        # Garante diretorio ~/.docker no servidor (pode nao existir em host novo)
        # Padrao v1.37 do composite deploy-via-ssh (Spring)
        ssh -o ConnectTimeout=30 \
          -o StrictHostKeyChecking=no \
          "${SSH_TARGET}" "mkdir -p ~/.docker && chmod 700 ~/.docker"

        mkdir -p ~/.docker
        chmod 700 ~/.docker

        scp -o ConnectTimeout=30 \
          -o StrictHostKeyChecking=no \
          /tmp/.env "${DEPLOY_SCRIPT}" \
          "${SSH_TARGET}:/tmp/"

        scp -o ConnectTimeout=30 \
          -o StrictHostKeyChecking=no \
          "${HOME}/.docker/config.json" \
          "${SSH_TARGET}:~/.docker/config.json.tmp"

        echo "Files uploaded to ${SSH_TARGET}:/tmp/"

    - name: Execute deploy on server
      shell: bash
      env:
        SSH_TARGET: ${{ inputs.ssh-target }}
        DEPLOY_DIR: ${{ inputs.deploy-dir }}
        REGISTRY: ${{ inputs.registry }}
        IMAGE_NAME: ${{ inputs.image-name }}
        LOCAL_IMAGE_NAME: ${{ inputs.local-image-name }}
        COMPOSE_FILE: ${{ inputs.compose-file }}
        IMAGE_TAG: ${{ inputs.image-tag }}
      run: |
        set -e

        ssh -o ConnectTimeout=30 -o StrictHostKeyChecking=no \
          "${SSH_TARGET}" \
          env DEPLOY_DIR="${DEPLOY_DIR}" \
              REGISTRY="${REGISTRY}" \
              IMAGE_NAME="${IMAGE_NAME}" \
              LOCAL_IMAGE_NAME="${LOCAL_IMAGE_NAME}" \
              COMPOSE_FILE="${COMPOSE_FILE}" \
              IMAGE_TAG="${IMAGE_TAG}" \
              bash /tmp/deploy-gateway.sh

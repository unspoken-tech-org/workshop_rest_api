name: Deploy API via SSH (QA)
description: >
  Prepares .env + JWT keys on the runner, scps to the QA VM and runs deploy.sh.
  Used exclusively by the `deploy-api-qa.yml` pipeline (Spring Boot API in QA).
  Requires Setup Tailscale executed previously in the job.

inputs:
  ssh-target:
    description: 'SSH target in the user@host format'
    required: true
  deploy-dir:
    description: 'Deploy directory on the server'
    required: true
  registry:
    description: 'Docker registry (e.g., ghcr.io)'
    required: true
  image-name:
    description: 'Full image name in the registry (e.g., org/repo)'
    required: true
  local-image-name:
    description: 'Local image name generated by docker compose'
    required: true
  compose-file:
    description: 'docker-compose file name on the server'
    required: true
  image-tag:
    description: 'Image tag to be deployed'
    required: true
  deploy-script:
    description: 'Path to deploy.sh in the repository'
    required: true
  db-name:
    description: 'PostgreSQL database name'
    required: true
  db-username:
    description: 'Database user'
    required: true
  db-password:
    description: 'Database password'
    required: true
  admin-email:
    description: 'Application admin email'
    required: true
  jwt-private-b64:
    description: 'RSA private key in base64'
    required: true
  jwt-public-b64:
    description: 'RSA public key in base64'
    required: true

runs:
  using: composite
  steps:
    - name: Prepare deploy files on runner
      shell: bash
      env:
        DB_NAME: ${{ inputs.db-name }}
        DB_USERNAME: ${{ inputs.db-username }}
        DB_PASSWORD: ${{ inputs.db-password }}
        ADMIN_EMAIL: ${{ inputs.admin-email }}
        JWT_PRIVATE_KEY: ${{ inputs.jwt-private-b64 }}
        JWT_PUBLIC_KEY: ${{ inputs.jwt-public-b64 }}
      run: |
        set -e

        {
          echo "DB_NAME=${DB_NAME}"
          echo "DB_USERNAME=${DB_USERNAME}"
          echo "DB_PASSWORD=${DB_PASSWORD}"
          echo "ADMIN_EMAIL=${ADMIN_EMAIL}"
        } > /tmp/.env
        chmod 600 /tmp/.env

        echo "${JWT_PRIVATE_KEY}" | base64 -d > /tmp/private-pkcs8.pem
        echo "${JWT_PUBLIC_KEY}" | base64 -d > /tmp/public.pem
        chmod 600 /tmp/private-pkcs8.pem
        chmod 644 /tmp/public.pem

        echo "Deploy files prepared:"
        ls -la /tmp/.env /tmp/private-pkcs8.pem /tmp/public.pem

    - name: Upload files to server
      shell: bash
      env:
        SSH_TARGET: ${{ inputs.ssh-target }}
        DEPLOY_DIR: ${{ inputs.deploy-dir }}
        DEPLOY_SCRIPT: ${{ inputs.deploy-script }}
        COMPOSE_FILE: ${{ inputs.compose-file }}
      run: |
        set -e

        # Ensure deploy directory and ~/.docker exist on the server
        ssh -o ConnectTimeout=30 \
          -o StrictHostKeyChecking=no \
          "${SSH_TARGET}" "mkdir -p '${DEPLOY_DIR}' ~/.docker && chmod 700 ~/.docker"

        mkdir -p ~/.docker
        chmod 700 ~/.docker

        scp -o ConnectTimeout=30 \
          -o StrictHostKeyChecking=no \
          /tmp/.env /tmp/private-pkcs8.pem /tmp/public.pem \
          "${DEPLOY_SCRIPT}" \
          "${SSH_TARGET}:/tmp/"

        # Upload compose file to deploy dir
        scp -o ConnectTimeout=30 \
          -o StrictHostKeyChecking=no \
          "${COMPOSE_FILE}" \
          "${SSH_TARGET}:${DEPLOY_DIR}/${COMPOSE_FILE}"

        # Upload Dockerfile for PostgreSQL image build (first deploy only)
        scp -o ConnectTimeout=30 \
          -o StrictHostKeyChecking=no \
          "Dockerfile.pgbackrest" \
          "${SSH_TARGET}:${DEPLOY_DIR}/Dockerfile.pgbackrest"

        scp -o ConnectTimeout=30 \
          -o StrictHostKeyChecking=no \
          "${HOME}/.docker/config.json" \
          "${SSH_TARGET}:~/.docker/config.json.tmp"

        echo "Files uploaded to ${SSH_TARGET}:${DEPLOY_DIR}/"

    - name: Execute deploy on server
      shell: bash
      env:
        SSH_TARGET: ${{ inputs.ssh-target }}
        DEPLOY_DIR: ${{ inputs.deploy-dir }}
        REGISTRY: ${{ inputs.registry }}
        IMAGE_NAME: ${{ inputs.image-name }}
        LOCAL_IMAGE_NAME: ${{ inputs.local-image-name }}
        COMPOSE_FILE: ${{ inputs.compose-file }}
        IMAGE_TAG: ${{ inputs.image-tag }}
      run: |
        set -e

        ssh -o ConnectTimeout=30 -o StrictHostKeyChecking=no \
          "${SSH_TARGET}" \
          env DEPLOY_DIR="${DEPLOY_DIR}" \
              REGISTRY="${REGISTRY}" \
              IMAGE_NAME="${IMAGE_NAME}" \
              LOCAL_IMAGE_NAME="${LOCAL_IMAGE_NAME}" \
              COMPOSE_FILE="${COMPOSE_FILE}" \
              IMAGE_TAG="${IMAGE_TAG}" \
              bash /tmp/deploy.sh

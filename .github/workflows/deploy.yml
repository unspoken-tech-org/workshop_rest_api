name: Deploy Spring Boot App via Self-Hosted Runner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy on Home Server
    runs-on: self-hosted

    steps:
      - name: Initial step
        run: |
          echo "Actual directory:"
          pwd
          echo "Folder content:"
          ls -la

      - name: Update local repository
        run: |
          echo "Access project folder"
          cd ~/deploy/workshop_rest_api
          git pull origin main

      - name: Write .env with secrets
        run: |
          cd ~/deploy/workshop_rest_api
          cat > .env <<EOF
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          HOST_BIND_IP=${{ secrets.HOST_BIND_IP }}
          LAN_CIDR=${{ secrets.LAN_CIDR }}
          EOF
          
          echo ".env created:"
          grep -E '^(DB_NAME|DB_USERNAME|HOST_BIND_IP|LAN_CIDR)=' .env || true

      - name: Restart Docker containers
        run: |
          echo "Updating Docker containers"
          cd ~/deploy/workshop_rest_api
          docker compose -f docker-compose-production.yml down || true
          docker compose -f docker-compose-production.yml up -d --build
          docker compose -f docker-compose-production.yml ps

      - name: Grant LAN access at pg_hba.conf
        run: |
          cd ~/deploy/workshop_rest_api
          PG_CID=$(docker compose -f docker-compose-production.yml ps -q workshop_db)
          docker exec "$PG_CID" bash -lc '
            set -e
            LINE="host all all ${{ secrets.LAN_CIDR }} md5"
            FILE="$PGDATA/pg_hba.conf"
            grep -qF "$LINE" "$FILE" || echo "$LINE" >> "$FILE"
          '
          docker restart "$PG_CID"

      - name: Verify containers status and logs
        run: |
          cd ~/deploy/workshop_rest_api
          
          echo "===== CONTAINERS STATUS ====="
          docker compose -f docker-compose-production.yml ps
          
          echo ""
          echo "===== CONTAINERS LOGS (Last 50) ====="
          for service in $(docker compose -f docker-compose-production.yml ps --services); do
            echo ""
            echo "----- Logs: $service -----"
            docker compose -f docker-compose-production.yml logs --tail=50 $service || true
          done



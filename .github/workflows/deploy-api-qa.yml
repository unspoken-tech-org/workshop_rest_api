# ===========================================================
# Workflow: Deploy Spring Boot API to QA (VM Dedicada)
# ===========================================================
# Orchestrates: build GHCR -> deploy via SSH -> verify -> cleanup
# Local dependencies:
#   .github/actions/api-qa/deploy-via-ssh-api-qa -> upload + run deploy.sh
#   .github/actions/shared/print-banner          -> standardized status log
#   tailscale/github-action                      -> WireGuard tunnel for SSH
# Remote scripts (executed on the QA VM):
#   .github/scripts/api-qa/deploy.sh       -> pull, retag, restart, healthcheck
#   .github/scripts/api-qa/rollback.sh     -> restore :backup image
#   .github/scripts/api-qa/verify.sh       -> pgbackrest + container status
#   .github/scripts/api-qa/cleanup.sh      -> Docker image prune
# ===========================================================

name: Deploy API (QA) v2 (Hosted + Tailscale)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag, branch or commit to deploy to QA'
        required: false
        default: 'main'

permissions:
  contents: read

concurrency:
  group: deploy-api-qa
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: unspoken-tech-org/workshop_rest_api
  COMPOSE_FILE: docker-compose-qa.yml
  DEPLOY_DIR: /home/workshop/deploy/workshop_rest_api_qa
  LOCAL_IMAGE_NAME: workshop_rest_api_qa
  SSH_USER: ${{ secrets.QA_SSH_USER }}
  TS_IP: ${{ secrets.QA_TS_TAILSCALE_IP }}
  SSH_TARGET: ${{ secrets.QA_SSH_USER }}@${{ secrets.QA_TS_TAILSCALE_IP }}
  DEPLOY_SCRIPT: .github/scripts/api-qa/deploy.sh
  ROLLBACK_SCRIPT: .github/scripts/api-qa/rollback.sh
  VERIFY_SCRIPT: .github/scripts/api-qa/verify.sh
  CLEANUP_SCRIPT: .github/scripts/api-qa/cleanup.sh

jobs:
  # ===========================================
  # JOB 1: BUILD + PUSH GHCR
  # ===========================================
  build:
    name: Build & Push Image
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    outputs:
      deployed-image-tag: ${{ steps.prep.outputs.tag }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Java 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build with Gradle (skip tests)
        run: ./gradlew build -x test

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tag
        id: prep
        env:
          INPUT_REF: ${{ github.event.inputs.ref || github.ref_name }}
        run: |
          TAG="${INPUT_REF//\//-}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.prep.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print build banner
        uses: ./.github/actions/shared/print-banner
        with:
          prefix: BUILD
          image-tag: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.prep.outputs.tag }}

  # ===========================================
  # JOB 2: DEPLOY
  # ===========================================
  deploy:
    name: Deploy to QA
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    needs: build
    environment:
      name: qa
      url: https://api-qa.eletroluk.com/actuator/health
    permissions:
      contents: read
      packages: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Tailscale
        uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888 # v4.1.3
        with:
          authkey: ${{ secrets.QA_TS_AUTH_KEY }}
          tags: tag:ci
          ping: ${{ secrets.QA_TS_TAILSCALE_IP }}

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy via SSH
        uses: ./.github/actions/api-qa/deploy-via-ssh-api-qa
        with:
          ssh-target: ${{ env.SSH_TARGET }}
          deploy-dir: ${{ env.DEPLOY_DIR }}
          registry: ${{ env.REGISTRY }}
          image-name: ${{ env.IMAGE_NAME }}
          local-image-name: ${{ env.LOCAL_IMAGE_NAME }}
          compose-file: ${{ env.COMPOSE_FILE }}
          image-tag: ${{ needs.build.outputs.deployed-image-tag }}
          deploy-script: ${{ env.DEPLOY_SCRIPT }}
          db-name: ${{ secrets.QA_DB_NAME }}
          db-username: ${{ secrets.QA_DB_USERNAME }}
          db-password: ${{ secrets.QA_DB_PASSWORD }}
          admin-email: ${{ secrets.QA_ADMIN_EMAIL }}
          jwt-private-b64: ${{ secrets.QA_JWT_RSA_PRIVATE_KEY_B64 }}
          jwt-public-b64: ${{ secrets.QA_JWT_RSA_PUBLIC_KEY_B64 }}

      - name: Rollback on failure
        if: failure()
        run: |
          scp -o ConnectTimeout=30 -o StrictHostKeyChecking=no \
            "${ROLLBACK_SCRIPT}" "${SSH_TARGET}:${DEPLOY_DIR}/.tmp/rollback.sh"
          ssh -o ConnectTimeout=30 -o StrictHostKeyChecking=no \
            "${SSH_TARGET}" "chmod +x '${DEPLOY_DIR}/.tmp/rollback.sh' && DEPLOY_DIR='${DEPLOY_DIR}' COMPOSE_FILE='${COMPOSE_FILE}' '${DEPLOY_DIR}/.tmp/rollback.sh'"

  # ===========================================
  # JOB 3: VERIFY
  # ===========================================
  verify:
    name: Verify Deployment
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: deploy
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Tailscale
        uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888 # v4.1.3
        with:
          authkey: ${{ secrets.QA_TS_AUTH_KEY }}
          tags: tag:ci
          ping: ${{ secrets.QA_TS_TAILSCALE_IP }}

      - name: Verify via SSH
        run: |
          ssh -o ConnectTimeout=30 -o StrictHostKeyChecking=no \
            "${SSH_TARGET}" "mkdir -p '${DEPLOY_DIR}/.tmp' && chmod 700 '${DEPLOY_DIR}/.tmp'"
          scp -o ConnectTimeout=30 -o StrictHostKeyChecking=no \
            "${VERIFY_SCRIPT}" "${SSH_TARGET}:${DEPLOY_DIR}/.tmp/"
          ssh -o ConnectTimeout=30 -o StrictHostKeyChecking=no \
            "${SSH_TARGET}" "chmod +x '${DEPLOY_DIR}/.tmp/verify.sh' && DEPLOY_DIR='${DEPLOY_DIR}' COMPOSE_FILE='${COMPOSE_FILE}' '${DEPLOY_DIR}/.tmp/verify.sh'"
          ssh -o ConnectTimeout=30 -o StrictHostKeyChecking=no \
            "${SSH_TARGET}" "rm -f '${DEPLOY_DIR}/.tmp/verify.sh'"

  # ===========================================
  # JOB 4: CLEANUP
  # ===========================================
  cleanup:
    name: Cleanup
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: verify
    if: always()
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Tailscale
        uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888 # v4.1.3
        with:
          authkey: ${{ secrets.QA_TS_AUTH_KEY }}
          tags: tag:ci
          ping: ${{ secrets.QA_TS_TAILSCALE_IP }}

      - name: Cleanup via SSH
        run: |
          ssh -o ConnectTimeout=30 -o StrictHostKeyChecking=no \
            "${SSH_TARGET}" "mkdir -p '${DEPLOY_DIR}/.tmp' && chmod 700 '${DEPLOY_DIR}/.tmp'"
          scp -o ConnectTimeout=30 -o StrictHostKeyChecking=no \
            "${CLEANUP_SCRIPT}" "${SSH_TARGET}:${DEPLOY_DIR}/.tmp/"
          ssh -o ConnectTimeout=30 -o StrictHostKeyChecking=no \
            "${SSH_TARGET}" "chmod +x '${DEPLOY_DIR}/.tmp/cleanup.sh' && '${DEPLOY_DIR}/.tmp/cleanup.sh'"
          ssh -o ConnectTimeout=30 -o StrictHostKeyChecking=no \
            "${SSH_TARGET}" "rm -rf '${DEPLOY_DIR}/.tmp'"

      - name: Print final banner
        if: success()
        uses: ./.github/actions/shared/print-banner
        with:
          prefix: DEPLOY
          image-tag: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.deployed-image-tag }}

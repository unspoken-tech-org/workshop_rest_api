# ===========================================================
# Workflow: Deploy Spring Boot API to Production
# ===========================================================
# Orchestrates: build GHCR -> deploy via SSH -> verify -> cleanup
# Local dependencies:
#   .github/actions/api/deploy-via-ssh-api -> upload + run deploy.sh
#   .github/actions/shared/print-banner   -> standardized status log
#   tailscale/github-action               -> WireGuard tunnel for SSH
# Remote scripts (executed on the server):
#   .github/scripts/api/deploy.sh       -> pull, retag, restart, healthcheck
#   .github/scripts/api/rollback.sh     -> restore :backup image
#   .github/scripts/api/verify.sh       -> pgbackrest + container status
#   .github/scripts/api/cleanup.sh      -> Docker image prune
# ===========================================================

name: Deploy API (Prod) v10 (Hosted + Tailscale)

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag, branch or commit to deploy'
        required: false
        default: 'main'

permissions:
  contents: read

concurrency:
  group: deploy-api-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: unspoken-tech-org/workshop_rest_api
  COMPOSE_FILE: docker-compose-production.yml
  DEPLOY_DIR: /home/workshop/deploy/workshop_rest_api
  LOCAL_IMAGE_NAME: workshop_rest_api-workshop_spring_app
  SSH_USER: ${{ secrets.PROD_SSH_USER }}
  TS_IP: ${{ secrets.TS_TAILSCALE_IP }}
  SSH_TARGET: ${{ secrets.PROD_SSH_USER }}@${{ secrets.TS_TAILSCALE_IP }}
  DEPLOY_SCRIPT: .github/scripts/api/deploy.sh
  ROLLBACK_SCRIPT: .github/scripts/api/rollback.sh
  VERIFY_SCRIPT: .github/scripts/api/verify.sh
  CLEANUP_SCRIPT: .github/scripts/api/cleanup.sh

jobs:
  # ===========================================
  # JOB 1: BUILD + PUSH GHCR
  # ===========================================
  build:
    name: Build & Push Image
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    outputs:
      deployed-image-tag: ${{ steps.prep.outputs.tag }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Java 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build with Gradle (skip tests)
        run: ./gradlew build -x test

      - name: Login to GHCR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tag
        id: prep
        env:
          INPUT_REF: ${{ github.event.inputs.ref || github.ref_name }}
        run: |
          TAG="${INPUT_REF//\//-}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.prep.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print build banner
        uses: ./.github/actions/shared/print-banner
        with:
          prefix: BUILD
          image-tag: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.prep.outputs.tag }}

  # ===========================================
  # JOB 2: DEPLOY
  # ===========================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    needs: build
    environment:
      name: production
      url: https://api.eletroluk.com/actuator/health
    permissions:
      contents: read
      packages: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Tailscale
        uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888 # v4.1.3
        with:
          authkey: ${{ secrets.TS_AUTH_KEY }}
          tags: tag:ci
          ping: ${{ secrets.TS_TAILSCALE_IP }}

      - name: Login to GHCR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy via SSH
        uses: ./.github/actions/api/deploy-via-ssh-api
        with:
          ssh-target: ${{ env.SSH_TARGET }}
          deploy-dir: ${{ env.DEPLOY_DIR }}
          registry: ${{ env.REGISTRY }}
          image-name: ${{ env.IMAGE_NAME }}
          local-image-name: ${{ env.LOCAL_IMAGE_NAME }}
          compose-file: ${{ env.COMPOSE_FILE }}
          image-tag: ${{ needs.build.outputs.deployed-image-tag }}
          deploy-script: ${{ env.DEPLOY_SCRIPT }}
          db-name: ${{ secrets.DB_NAME }}
          db-username: ${{ secrets.DB_USERNAME }}
          db-password: ${{ secrets.DB_PASSWORD }}
          admin-email: ${{ secrets.ADMIN_EMAIL }}
          jwt-private-b64: ${{ secrets.JWT_RSA_PRIVATE_KEY_B64 }}
          jwt-public-b64: ${{ secrets.JWT_RSA_PUBLIC_KEY_B64 }}

      - name: Rollback on failure
        if: failure()
        run: |
          scp -o ConnectTimeout=30 -o StrictHostKeyChecking=no \
            "${ROLLBACK_SCRIPT}" "${SSH_TARGET}:/tmp/"
          ssh -o ConnectTimeout=30 -o StrictHostKeyChecking=no \
            "${SSH_TARGET}" "chmod +x /tmp/rollback.sh && /tmp/rollback.sh"

  # ===========================================
  # JOB 3: VERIFY
  # ===========================================
  verify:
    name: Verify Deployment
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: deploy
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Tailscale
        uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888 # v4.1.3
        with:
          authkey: ${{ secrets.TS_AUTH_KEY }}
          tags: tag:ci
          ping: ${{ secrets.TS_TAILSCALE_IP }}

      - name: Verify via SSH
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          scp -o ConnectTimeout=30 -o StrictHostKeyChecking=no \
            "${VERIFY_SCRIPT}" "${SSH_TARGET}:/tmp/"
          ssh -o ConnectTimeout=30 -o StrictHostKeyChecking=no \
            "${SSH_TARGET}" "chmod +x /tmp/verify.sh && DB_PASSWORD='${DB_PASSWORD}' /tmp/verify.sh"

  # ===========================================
  # JOB 4: CLEANUP
  # ===========================================
  cleanup:
    name: Cleanup
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: verify
    if: always()
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Tailscale
        uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888 # v4.1.3
        with:
          authkey: ${{ secrets.TS_AUTH_KEY }}
          tags: tag:ci
          ping: ${{ secrets.TS_TAILSCALE_IP }}

      - name: Cleanup via SSH
        run: |
          scp -o ConnectTimeout=30 \
            -o StrictHostKeyChecking=no \
            "${CLEANUP_SCRIPT}" "${SSH_TARGET}:/tmp/"
          ssh -o ConnectTimeout=30 \
            -o StrictHostKeyChecking=no \
            "${SSH_TARGET}" "chmod +x /tmp/cleanup.sh && /tmp/cleanup.sh"

      - name: Print final banner
        if: success()
        uses: ./.github/actions/shared/print-banner
        with:
          prefix: DEPLOY
          image-tag: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.deployed-image-tag }}

services:
  workshop_db:
    container_name: workshop-db
    build:
      context: .
      dockerfile: Dockerfile.pgbackrest
    image: workshop/postgres16-pgbackrest:latest
    restart: always
    environment:
      LC_ALL: C.UTF-8
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    command:
      - "postgres"
      - "-c"
      - "listen_addresses=*"
      - "-c"
      - "timezone=America/Sao_Paulo"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "archive_mode=on"
      - "-c"
      - "archive_timeout=60s"
      - "-c"
      - "archive_command=pgbackrest --stanza=workshop archive-push %p"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB && psql -U $$POSTGRES_USER -d $$POSTGRES_DB -c 'SELECT 1' > /dev/null" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - db_data:/var/lib/postgresql/data
      - /srv/pgbackrest/conf:/etc/pgbackrest
      - /srv/pgbackrest/repo:/var/lib/pgbackrest
      - /srv/pgbackrest/logs:/var/log/pgbackrest
      - /srv/postgres/logical_dumps:/backups/logical
    networks:
      - workshop-network
    stop_grace_period: 2m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  workshop_spring_app:
    container_name: workshop-api
    labels:
      workshop.env: "production"
    restart: unless-stopped
    image: workshop_rest_api-workshop_spring_app:latest
    command: [ "java", "-Dspring.profiles.active=production", "-jar", "app.jar" ]
    expose:
      - "8080"
    stop_grace_period: 60s
    depends_on:
      workshop_db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://workshop_db:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_PROFILES_ACTIVE: production
      JAVA_TOOL_OPTIONS: -Xms256m -Xmx768m -Duser.timezone=America/Sao_Paulo
      TZ: America/Sao_Paulo
    volumes:
      - ./config/keys:/app/config/keys:ro
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider -q http://localhost:8080/actuator/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 45s
    networks:
      - workshop-network
      - workshop-ingress
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

volumes:
  db_data:

networks:
  workshop-network:
    name: workshop-network
    driver: bridge
  workshop-ingress:
    name: workshop-ingress
    driver: bridge

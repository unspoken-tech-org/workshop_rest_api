services:
  # ==========================================
  # LOKI - Centralized log storage
  # Stores logs from all environments (prod, qa, gateway)
  # ==========================================
  loki:
    image: grafana/loki:2.9.2
    container_name: loki-unified
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./infra/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_unified_data:/loki
    networks:
      - observability-network
      - workshop-network         # Access to prod API
      - workshop-qa-network      # Access to QA API
      - workshop-ingress         # Access to Gateway
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==========================================
  # PROMTAIL - Log collectors (one per environment)
  # ==========================================
  
  # Collects logs from Production API
  promtail-prod:
    image: grafana/promtail:2.9.2
    container_name: promtail-prod
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/promtail-config-prod.yaml:/etc/promtail/config.yaml:ro
    environment:
      - LOKI_URL=http://loki-unified:3100
      - ENV_NAME=production
      - APP_CONTAINER_NAME=workshop-api
    command: -config.file=/etc/promtail/config.yaml -config.expand-env=true
    depends_on:
      - loki
    networks:
      - observability-network
      - workshop-network
    restart: unless-stopped

  # Collects logs from QA API
  promtail-qa:
    image: grafana/promtail:2.9.2
    container_name: promtail-qa
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/promtail-config-qa.yaml:/etc/promtail/config.yaml:ro
    environment:
      - LOKI_URL=http://loki-unified:3100
      - ENV_NAME=qa
      - APP_CONTAINER_NAME=workshop-api-qa
    command: -config.file=/etc/promtail/config.yaml -config.expand-env=true
    depends_on:
      - loki
    networks:
      - observability-network
      - workshop-qa-network
    restart: unless-stopped

  # Collects logs from Gateway (Caddy + Cloudflared)
  promtail-gateway:
    image: grafana/promtail:2.9.2
    container_name: promtail-gateway
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/promtail-config-gateway.yaml:/etc/promtail/config.yaml:ro
    environment:
      - LOKI_URL=http://loki-unified:3100
      - ENV_NAME=gateway
    command: -config.file=/etc/promtail/config.yaml -config.expand-env=true
    depends_on:
      - loki
    networks:
      - observability-network
      - workshop-ingress
    restart: unless-stopped

  # ==========================================
  # GRAFANA - Unified dashboards
  # Single instance for all environments
  # ==========================================
  grafana:
    image: grafana/grafana:10.2.3
    container_name: grafana-unified
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://grafana.eletroluk.com
      - GF_SERVER_DOMAIN=grafana.eletroluk.com
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - grafana_unified_data:/var/lib/grafana
      - ./infra/grafana-provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
    networks:
      - observability-network
      - workshop-ingress  # Access via Caddy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

# ==========================================
# NETWORKS
# ==========================================
networks:
  observability-network:
    name: observability-network
    driver: bridge
  
  # External networks (created by other stacks)
  workshop-network:
    external: true
  workshop-qa-network:
    external: true
  workshop-ingress:
    external: true

# ==========================================
# VOLUMES
# ==========================================
volumes:
  loki_unified_data:
    name: loki_unified_data
  grafana_unified_data:
    name: grafana_unified_data
